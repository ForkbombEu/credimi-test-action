name: 🧪 credimi-tests
description: Test your wallet, credential issuer or verifier with credimi pipelines.

inputs:
  api-key:
    description: Credimi API key used to authenticate requests.
    required: true
  apk-file:
    description: |
      Path to a local APK file to upload.
      Exactly one of apk-file or apk-url must be provided when testing a wallet.
    required: false
  apk-url:
    description: |
      URL of an APK that Credimi can download.
      Exactly one of apk-file or apk-url must be provided when testing a wallet.
    required: false
  issuer-url:
    description: |
      URL of the Issuer that will be tested by Credimi.
      Required when testing an Issuer.
    required: false
  credential-ids:
    description: |
      Credimi credential identifiers where to substitute the issuer URL with issuer-url, separated by new lines.
      Each identifier is usually formatted as "organization/issuer/credential".
      Required when testing an Issuer.
    required: false
  pipeline-ids:
    description: |
      Credimi pipeline identifiers to run, separated by new lines.
      Each identifier is usually formatted as "organization/pipeline".
    required: true
  runner-types:
    description: |
      Credimi runner types to use, separated by new lines.
      The action runs every pipeline-id on every listed runner type.
      Required when testing a wallet unless runner-ids is provided.
      Optional when testing an Issuer.
      Mutually exclusive with runner-ids.
      Possible values: android_emulator, redroid, android_phone, ios_simulator
    required: false
  runner-ids:
    description: |
      Credimi runner ids with their runner type, separated by new lines.
      Each line must be formatted as "<runner-id>/<runner-type>".
      The action runs every pipeline-id on every listed runner id.
      Required when testing a wallet unless runner-types is provided.
      Optional when testing an Issuer.
      Mutually exclusive with runner-types.
      Possible runner-type values: android_emulator, redroid, android_phone, ios_simulator
    required: false
  extra-runs:
    description: |
      Additional runs to add after the cartesian product is built, separated by new lines.
      Each line must contain "<pipeline-id> <runner-type>" or "<pipeline-id> <runner-id>/<runner-type>".
      When testing an Issuer without runner inputs, each line can contain just "<pipeline-id>".
    required: false
  exclude-runs:
    description: |
      Runs to remove after extra-runs are added, separated by new lines.
      Each line must contain "<pipeline-id> <runner-type>" or "<pipeline-id> <runner-id>/<runner-type>".
      When testing an Issuer without runner inputs, each line can contain just "<pipeline-id>".
      Exclusions match exact pipeline/runner pairs.
    required: false
  api-base-url:
    description: Credimi API base URL.
    required: false
    default: https://credimi.io

runs:
  using: composite
  steps:
    - name: Run Credimi pipelines
      shell: bash
      env:
        CREDIMI_API_KEY: ${{ inputs.api-key }}
        CREDIMI_PIPELINE_IDS: ${{ inputs.pipeline-ids }}
        CREDIMI_RUNNER_TYPES: ${{ inputs.runner-types }}
        CREDIMI_EXTRA_RUNS: ${{ inputs.extra-runs }}
        CREDIMI_EXCLUDE_RUNS: ${{ inputs.exclude-runs }}
        CREDIMI_RUNNER_IDS: ${{ inputs.runner-ids }}
        CREDIMI_APK_FILE: ${{ inputs.apk-file }}
        CREDIMI_APK_URL: ${{ inputs.apk-url }}
        CREDIMI_ISSUER_URL: ${{ inputs.issuer-url }}
        CREDIMI_CREDENTIAL_IDS: ${{ inputs.credential-ids }}
        CREDIMI_API_BASE_URL: ${{ inputs.api-base-url }}
        GITHUB_CONTEXT: ${{ toJson(github) }}
      run: |
        echo "::add-mask::${CREDIMI_API_KEY}"
        "${GITHUB_ACTION_PATH}/script.sh"
